<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eventzo – Smart Event Discovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #f5f0eb;
    --stone: #c8bfb0;
    --charcoal: #1a1a1a;
    --warm-white: rgba(255,255,255,0.92);
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d0d0d;
    color: white;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 52px;
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    animation: fadeDown 1s ease forwards;
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: white;
    text-decoration: none;
  }

  .nav-logo span {
    color: var(--stone);
  }

  .nav-links {
    display: flex;
    gap: 38px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(255,255,255,0.72);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.25s;
    position: relative;
  }

  .nav-links a::after {
    content: '';
    position: absolute;
    left: 0; bottom: -3px;
    width: 0; height: 1px;
    background: var(--stone);
    transition: width 0.3s ease;
  }

  .nav-links a:hover { color: white; }
  .nav-links a:hover::after { width: 100%; }

  /* ── HERO ── */
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    transform: scale(1.06);
    animation: bgPan 18s ease-in-out infinite alternate;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      160deg,
      rgba(0,0,0,0.72) 0%,
      rgba(0,0,0,0.45) 50%,
      rgba(0,0,0,0.68) 100%
    );
  }

  /* subtle grain */
  .hero-grain {
    position: absolute;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
  }

  /* ── CONTENT ── */
  .content {
    position: relative;
    z-index: 10;
    text-align: center;
    max-width: 680px;
    padding: 0 24px;
    animation: fadeUp 1.2s cubic-bezier(.16,1,.3,1) 0.2s both;
  }

  .eyebrow {
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 18px;
    font-weight: 400;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3.4rem, 8vw, 5.8rem);
    font-weight: 300;
    line-height: 1.0;
    letter-spacing: -0.01em;
    margin-bottom: 20px;
    color: white;
  }

  h1 em {
    font-style: italic;
    color: var(--stone);
  }

  .tagline {
    font-size: 0.95rem;
    color: rgba(255,255,255,0.58);
    line-height: 1.65;
    margin-bottom: 54px;
    font-weight: 300;
    max-width: 420px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 38px;
    justify-content: center;
  }

  .divider-line {
    flex: 1;
    max-width: 80px;
    height: 1px;
    background: var(--glass-border);
  }

  .divider-text {
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
  }

  /* ── CARDS ── */
  .cards {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .card {
    cursor: pointer;
    padding: 28px 36px;
    border: 1px solid var(--glass-border);
    background: var(--glass);
    backdrop-filter: blur(18px);
    border-radius: 4px;
    text-decoration: none;
    color: white;
    min-width: 200px;
    transition: background 0.3s, border-color 0.3s, transform 0.3s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .card:hover::before { opacity: 1; }
  .card:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.3);
    transform: translateY(-4px);
  }

  .card-icon {
    font-size: 1.5rem;
    margin-bottom: 12px;
    display: block;
    filter: grayscale(30%);
  }

  .card-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.35rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    display: block;
    margin-bottom: 6px;
  }

  .card-sub {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── SCROLL HINT ── */
  .scroll-hint {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.3);
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    z-index: 10;
    animation: pulse 2.5s ease-in-out infinite;
  }

  .scroll-line {
    width: 1px;
    height: 36px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes bgPan {
    from { transform: scale(1.06) translateX(0); }
    to { transform: scale(1.06) translateX(-2%); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.9; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="#">Event<span>zo</span></a>
  <ul class="nav-links">
    <li><a href="/about">About</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-grain"></div>

  <div class="content">
    <p class="eyebrow">Smart Event Discovery</p>

    <h1>Find events<br>that <em>matter</em></h1>

    <p class="tagline">
      Personalized recommendations based on your interests, location, and mood — so you never miss what's worth attending.
    </p>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">I am a</span>
      <div class="divider-line"></div>
    </div>

    <div class="cards">
      <a class="card" href="/signup/participant">
        <span class="card-icon">🎟</span>
        <span class="card-label">Participant</span>
        <span class="card-sub">Discover & attend</span>
      </a>
      <a class="card" href="/signup/organizer">
        <span class="card-icon">📋</span>
        <span class="card-label">Organiser</span>
        <span class="card-sub">Create & manage</span>
      </a>
    </div>
  </div>

  <div class="scroll-hint">
    <div class="scroll-line"></div>
    <span>Scroll</span>
  </div>
</section>

</body>
</html>
