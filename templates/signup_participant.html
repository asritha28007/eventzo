<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Eventzo – Participant Signup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --stone: #c8bfb0;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.12);
    --input-bg: rgba(255,255,255,0.05);
    --input-border: rgba(255,255,255,0.14);
    --input-focus: rgba(255,255,255,0.3);
    --error: #e07070;
  }

  html, body {
    min-height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: #0d0d0d;
    color: white;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 52px;
    background: rgba(0,0,0,0.25);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }

  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.55rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: white;
    text-decoration: none;
  }

  .nav-logo span { color: var(--stone); }

  .nav-links { display: flex; gap: 38px; list-style: none; }
  .nav-links a {
    color: rgba(255,255,255,0.72);
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: color 0.25s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    left: 0; bottom: -3px;
    width: 0; height: 1px;
    background: var(--stone);
    transition: width 0.3s ease;
  }
  .nav-links a:hover { color: white; }
  .nav-links a:hover::after { width: 100%; }

  /* ── BG ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: url('https://images.unsplash.com/photo-1540575467063-178a50c2df87?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
    filter: brightness(0.22) saturate(0.6);
  }

  .bg-grain {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px;
    pointer-events: none;
  }

  /* ── LAYOUT ── */
  .page-wrap {
    position: relative;
    z-index: 10;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 110px 24px 60px;
  }

  .form-card {
    width: 100%;
    max-width: 520px;
    background: rgba(15,15,15,0.7);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border-radius: 6px;
    padding: 50px 48px;
    animation: fadeUp 0.9s cubic-bezier(.16,1,.3,1) both;
  }

  /* ── HEADER ── */
  .form-eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 10px;
  }

  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.4rem;
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .form-title em { font-style: italic; color: var(--stone); }

  .form-sub {
    font-size: 0.82rem;
    color: rgba(255,255,255,0.4);
    margin-bottom: 36px;
    font-weight: 300;
  }

  /* ── DIVIDER ── */
  .rule {
    height: 1px;
    background: var(--glass-border);
    margin-bottom: 32px;
  }

  /* ── FORM ROW ── */
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    margin-bottom: 7px;
  }

  input {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 3px;
    padding: 12px 14px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    outline: none;
    transition: border-color 0.25s, background 0.25s;
  }

  input::placeholder { color: rgba(255,255,255,0.2); }

  input:focus {
    border-color: var(--input-focus);
    background: rgba(255,255,255,0.08);
  }

  /* phone prefix */
  .phone-wrap { position: relative; }
  .phone-prefix {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    color: rgba(255,255,255,0.45);
    pointer-events: none;
    user-select: none;
  }
  .phone-wrap input { padding-left: 46px; }

  /* ── PASSWORD STRENGTH ── */
  .strength-bar {
    display: flex;
    gap: 4px;
    margin-top: 7px;
  }
  .strength-bar span {
    flex: 1;
    height: 2px;
    border-radius: 2px;
    background: rgba(255,255,255,0.1);
    transition: background 0.3s;
  }
  .strength-bar.weak span:nth-child(1) { background: #e07070; }
  .strength-bar.medium span:nth-child(1),
  .strength-bar.medium span:nth-child(2) { background: #c8a96e; }
  .strength-bar.strong span { background: #82b99a; }

  /* ── SUBMIT ── */
  .submit-btn {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: white;
    color: #0d0d0d;
    border: none;
    border-radius: 3px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.25s, transform 0.2s;
  }

  .submit-btn:hover {
    background: var(--stone);
    transform: translateY(-1px);
  }

  /* ── FOOTER LINK ── */
  .form-footer {
    text-align: center;
    margin-top: 26px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
  }

  .form-footer a {
    color: var(--stone);
    text-decoration: none;
    transition: color 0.2s;
  }

  .form-footer a:hover { color: white; }

  /* ── ERROR ── */
  .error-msg {
    background: rgba(224,112,112,0.12);
    border: 1px solid rgba(224,112,112,0.3);
    border-radius: 3px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--error);
    margin-bottom: 20px;
    display: none;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="/">Event<span>zo</span></a>
  <ul class="nav-links">
    <li><a href="/#about">About</a></li>
    <li><a href="/#contact">Contact</a></li>
  </ul>
</nav>

<div class="bg-layer"></div>
<div class="bg-grain"></div>

<div class="page-wrap">
  <div class="form-card">

    <p class="form-eyebrow">Join Eventzo</p>
    <h1 class="form-title">Participant <em>Sign Up</em></h1>
    <p class="form-sub">Discover events tailored to your interests &amp; location.</p>

    <div class="rule"></div>

    <div class="error-msg" id="errMsg"></div>

    <form method="POST" action="/signup/participant" id="signupForm">

      <div class="row">
        <div class="field">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" placeholder="Arjun" required autocomplete="given-name">
        </div>
        <div class="field">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" placeholder="Sharma" required autocomplete="family-name">
        </div>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="arjun@gmail.com" required autocomplete="email">
      </div>

      <div class="field">
        <label for="phone">Phone Number</label>
        <div class="phone-wrap">
          <span class="phone-prefix">+91</span>
          <input type="tel" id="phone" name="phone" placeholder="98765 43210"
                 pattern="[6-9][0-9]{9}" maxlength="10" required autocomplete="tel">
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" oninput="checkStrength(this.value)">
        <div class="strength-bar" id="strengthBar">
          <span></span><span></span><span></span>
        </div>
      </div>

      <div class="field">
        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required autocomplete="new-password">
      </div>

      <button type="submit" class="submit-btn">Create Account</button>
    </form>

    <p class="form-footer">Already have an account? <a href="/login/participant">Log in</a></p>

  </div>
</div>

<script>
function checkStrength(val) {
  const bar = document.getElementById('strengthBar');
  bar.className = 'strength-bar';
  if (!val) return;
  const strong = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}/.test(val);
  const medium = val.length >= 6;
  if (strong) bar.classList.add('strong');
  else if (medium) bar.classList.add('medium');
  else bar.classList.add('weak');
}

document.getElementById('signupForm').addEventListener('submit', function(e) {
  const p = document.getElementById('password').value;
  const c = document.getElementById('confirm_password').value;
  const err = document.getElementById('errMsg');
  if (p !== c) {
    e.preventDefault();
    err.style.display = 'block';
    err.textContent = 'Passwords do not match. Please try again.';
  } else {
    err.style.display = 'none';
  }
});
</script>

</body>
</html>
